<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InventoryPro — ERP Inventory Management</title>
<style>
/* ═══ ERP DESIGN SYSTEM v1.0 ═══ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--surface:#fff;--s2:#f0f2f6;--s3:#e8ebf0;
  --border:#dde1e8;--border2:#c8cdd8;
  --text:#1c2030;--t2:#5c6478;--t3:#9ba3b5;
  --blue:#1849a9;--blue2:#eef2fc;--blue3:#0d2d6e;
  --green:#166534;--green2:#f0fdf4;--green3:#dcfce7;
  --amber:#92400e;--amber2:#fffbeb;
  --red:#991b1b;--red2:#fef2f2;--red3:#fee2e2;
  --teal:#115e59;--teal2:#f0fdfa;
  --orange:#c2410c;--orange2:#fff7ed;
  --purple:#6b21a8;--purple2:#faf5ff;
  --r:8px;--r2:12px;
}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;height:100%}
body{overflow:hidden}

/* TOPBAR */
.topbar{background:var(--blue3);display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:50px;position:sticky;top:0;z-index:60;box-shadow:0 2px 8px rgba(0,0,0,.2);color:#fff}
.logo{display:flex;align-items:center;gap:10px;font-weight:700}
.logo-box{width:30px;height:30px;background:#fff;color:var(--blue3);border-radius:7px;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center}
.logo-text{font-size:14px;font-weight:700}
.logo-sub{font-size:11px;opacity:.7;padding-left:8px;border-left:1px solid rgba(255,255,255,.2);margin-left:4px}
.global-search{flex:1;max-width:500px;position:relative;margin:0 20px}
.global-search input{width:100%;padding:8px 14px 8px 36px;border:1.5px solid rgba(255,255,255,.2);border-radius:8px;font-size:13px;background:rgba(255,255,255,.08);color:#fff;outline:none}
.global-search input::placeholder{color:rgba(255,255,255,.6)}
.global-search input:focus{background:#fff;color:var(--text)}
.gs-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.topbar-right{display:flex;align-items:center;gap:10px}
.loc-pill,.cur-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:5px 11px;font-size:11px;display:flex;align-items:center;gap:6px;cursor:pointer}
.loc-pill:hover,.cur-pill:hover{background:rgba(255,255,255,.18)}
.cur-pill{font-weight:700}
.urg-bell{position:relative;cursor:pointer;font-size:17px;padding:4px}
.urg-count{position:absolute;top:-2px;right:-2px;background:#dc2626;color:#fff;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.user-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border-radius:20px;padding:4px 12px 4px 4px;cursor:pointer}
.user-av{width:26px;height:26px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}
.user-nm{font-size:12px;display:flex;flex-direction:column;line-height:1.1}
.user-nm small{font-size:9px;opacity:.7}

/* LAYOUT */
.app-body{display:grid;grid-template-columns:230px 1fr;height:calc(100vh - 50px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:10px 0;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:800;color:var(--t3);padding:12px 16px 4px;text-transform:uppercase;letter-spacing:.09em}
.ni{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:12px;color:var(--t2);cursor:pointer;border-left:3px solid transparent;transition:all .12s;user-select:none}
.ni:hover{background:var(--s2);color:var(--text)}
.ni.active{background:var(--blue2);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.ni .ic{font-size:14px;width:18px;text-align:center}
.ni .ct-badge{margin-left:auto;background:var(--blue);color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:10px}
.ni .ct-badge.warn{background:var(--orange)}
.main{overflow-y:auto;padding:20px 24px}

/* PAGE HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.pt{font-size:20px;font-weight:700;color:var(--text)}
.ps{font-size:12px;color:var(--t2);margin-top:3px}
.brow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;font-weight:500;transition:all .12s;white-space:nowrap;line-height:1.4;font-family:inherit}
.btn:hover{background:var(--s2)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-p:hover{background:var(--blue3)}
.btn-g{background:var(--green);color:#fff;border-color:var(--green)}
.btn-g:hover{filter:brightness(1.1)}
.btn-r{background:var(--red);color:#fff;border-color:var(--red)}
.btn-r:hover{filter:brightness(1.1)}
.btn-o{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* BADGES */
.bdg{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.bd{width:5px;height:5px;border-radius:50%;background:currentColor}
.b-draft{background:var(--s3);color:var(--t2)}
.b-sub{background:#dbeafe;color:#1e40af}
.b-ok{background:var(--green3);color:var(--green)}
.b-warn{background:#fef3c7;color:var(--amber)}
.b-bad{background:var(--red3);color:var(--red)}
.b-info{background:var(--blue2);color:var(--blue)}
.b-purple{background:var(--purple2);color:var(--purple)}
.b-teal{background:var(--teal2);color:var(--teal)}
.b-orange{background:var(--orange2);color:var(--orange)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.card-t{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.card-flat{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:12px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}

/* STAT CARDS */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.stat-l{font-size:10px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-v{font-size:20px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.stat-s{font-size:10px;color:var(--t3);margin-top:3px;display:flex;align-items:center;gap:5px}
.stat-i{position:absolute;top:12px;right:12px;font-size:18px;opacity:.4}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--s2);text-align:left;padding:9px 12px;font-weight:700;color:var(--t2);font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);position:sticky;top:0}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:hover td{background:var(--s2)}
.tbl tr:last-child td{border-bottom:none}
.tbl.click tr{cursor:pointer}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.mono{font-family:'Consolas','Monaco',monospace;font-size:11px}
.txt-r{text-align:right}
.txt-c{text-align:center}
.muted{color:var(--t2)}
.muted-s{color:var(--t3);font-size:11px}

/* INPUTS */
.inp,.sel,.txa{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
.inp:focus,.sel:focus,.txa:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,73,169,.1)}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.fld{margin-bottom:13px}
.txa{min-height:70px;resize:vertical;font-family:inherit}
.chk{display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;padding:5px 0}
.chk input{accent-color:var(--blue);width:14px;height:14px}

/* MODAL */
.mb{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;overflow-y:auto}
.md{background:var(--surface);border-radius:var(--r2);width:100%;max-width:680px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.md.lg{max-width:920px}
.md.xl{max-width:1140px}
.md.sm{max-width:440px}
.mh{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mt{font-size:15px;font-weight:700}
.ms{font-size:11px;color:var(--t2);margin-top:2px}
.mx{cursor:pointer;font-size:22px;color:var(--t2);line-height:1;border:none;background:none;padding:2px 8px;border-radius:6px}
.mx:hover{background:var(--s2)}
.mc{padding:20px 22px;overflow-y:auto;flex:1}
.mf{padding:13px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--s2)}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{padding:9px 16px;font-size:12px;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;font-weight:500;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 22px;border-radius:var(--r);font-size:12px;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:tin .25s}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
.toast.warn{background:var(--orange)}
@keyframes tin{from{opacity:0;transform:translate(-50%,15px)}to{opacity:1;transform:translate(-50%,0)}}

/* AI ASSISTANT */
.ai-fab{position:fixed;bottom:22px;right:22px;width:54px;height:54px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:50%;color:#fff;font-size:24px;cursor:pointer;border:none;box-shadow:0 6px 20px rgba(79,70,229,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.ai-fab:hover{transform:scale(1.05)}
.ai-panel{position:fixed;bottom:22px;right:22px;width:380px;height:540px;background:var(--surface);border-radius:var(--r2);box-shadow:0 20px 60px rgba(0,0,0,.25);z-index:101;display:flex;flex-direction:column;border:1px solid var(--border)}
.ai-h{padding:14px 16px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border-radius:var(--r2) var(--r2) 0 0;display:flex;justify-content:space-between;align-items:center}
.ai-h-t{font-size:13px;font-weight:700}
.ai-h-s{font-size:10px;opacity:.85}
.ai-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.ai-m{padding:9px 13px;border-radius:var(--r);font-size:12px;max-width:88%;line-height:1.5;word-wrap:break-word}
.ai-m.u{background:var(--blue2);color:var(--blue3);align-self:flex-end}
.ai-m.a{background:var(--s2);color:var(--text);align-self:flex-start}
.ai-m.s{background:#fef3c7;color:var(--amber);font-size:11px;align-self:center;text-align:center;font-style:italic}
.ai-in{padding:12px;border-top:1px solid var(--border);display:flex;gap:6px}
.ai-in input{flex:1;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;outline:none}
.ai-in input:focus{border-color:var(--blue)}
.ai-in button{padding:8px 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600}

/* LOGIN */
.login-wrap{position:fixed;inset:0;background:linear-gradient(135deg,#0d2d6e,#1849a9);display:flex;align-items:center;justify-content:center;z-index:300}
.login-card{background:#fff;border-radius:14px;padding:32px;width:420px;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:24px}
.login-logo .logo-box{width:48px;height:48px;font-size:14px;background:var(--blue3);color:#fff;margin-bottom:10px}
.login-title{font-size:18px;font-weight:700;text-align:center}
.login-sub{font-size:12px;color:var(--t2);text-align:center;margin-top:4px;margin-bottom:24px}
.demo-users{display:grid;grid-template-columns:1fr;gap:8px;margin-top:14px}
.demo-u{padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s;text-align:left;background:#fff}
.demo-u:hover{border-color:var(--blue);background:var(--blue2)}
.demo-u-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.demo-u-info{flex:1}
.demo-u-name{font-size:13px;font-weight:600}
.demo-u-role{font-size:10px;color:var(--t2)}

/* PIC UPLOAD */
.pic-row{display:flex;gap:10px}
.pic-slot{flex:1;aspect-ratio:1;border:2px dashed var(--border2);border-radius:var(--r);background:var(--s2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
.pic-slot:hover{border-color:var(--blue);background:var(--blue2)}
.pic-slot img{width:100%;height:100%;object-fit:cover}
.pic-slot .ph-txt{font-size:11px;color:var(--t3);text-align:center;padding:6px}
.pic-slot .pic-rm{position:absolute;top:4px;right:4px;background:var(--red);color:#fff;border:none;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;display:none}
.pic-slot.has-img .pic-rm{display:flex;align-items:center;justify-content:center}

/* APPROVAL FLOW */
.appr-flow{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.appr-step{padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;display:flex;align-items:center;gap:5px}
.appr-step.done{background:var(--green3);color:var(--green)}
.appr-step.cur{background:#fef3c7;color:var(--amber);border:1.5px solid var(--amber)}
.appr-step.pend{background:var(--s3);color:var(--t2)}
.appr-step.rej{background:var(--red3);color:var(--red)}
.appr-arr{color:var(--t3);font-size:10px}

/* MISC */
.ftext{font-size:11px;color:var(--t2);margin-top:4px}
.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:12px}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--t2)}
.kv .v{font-weight:600}
.sep{height:1px;background:var(--border);margin:14px 0}
.tag{display:inline-block;padding:2px 7px;background:var(--s3);border-radius:4px;font-size:10px;font-weight:600;color:var(--t2);margin-right:3px}
.alert-banner{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;padding:14px 18px;border-radius:var(--r2);margin-bottom:14px;display:flex;align-items:flex-start;gap:12px}
.alert-banner .ic{font-size:22px}
.alert-banner h4{font-size:13px;margin-bottom:3px}
.alert-banner p{font-size:11px;opacity:.95;line-height:1.5}
.search-bar{position:relative;flex:1;max-width:320px}
.search-bar input{width:100%;padding:7px 11px 7px 30px;border:1px solid var(--border2);border-radius:var(--r);font-size:12px;outline:none}
.search-bar input:focus{border-color:var(--blue)}
.search-bar::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.5}
.empty{padding:40px;text-align:center;color:var(--t2)}
.empty .ic{font-size:36px;opacity:.4;margin-bottom:8px}
.bar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;background:var(--blue);border-radius:3px}
.bar-fill.g{background:var(--green)}
.bar-fill.a{background:var(--amber)}
.bar-fill.r{background:var(--red)}
.pop{position:absolute;top:55px;background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:0 10px 30px rgba(0,0,0,.15);min-width:220px;z-index:80;color:var(--text);overflow:hidden}
.pop-item{padding:9px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.pop-item:last-child{border-bottom:none}
.pop-item:hover{background:var(--s2)}
.pop-item.active{background:var(--blue2);color:var(--blue);font-weight:600}
.pop-item .sub{margin-left:auto;font-size:10px;color:var(--t3)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-box">IP</div>
      <div class="login-title">InventoryPro</div>
      <div class="login-sub">ERP Inventory Management • Demo Mode</div>
    </div>
    <div class="lbl">Select a demo user to continue</div>
    <div class="demo-users" id="demoUsers"></div>
    <div style="margin-top:18px;padding:10px 12px;background:var(--amber2);border-radius:6px;font-size:11px;color:var(--amber);line-height:1.5">
      <strong>ℹ Demo mode:</strong> Each user has different permissions and approval authority. Try logging in as different roles to see how approvals work.
    </div>
  </div>
</div>

<!-- MAIN APP (hidden until login) -->
<div id="app" style="display:none">

<div class="topbar">
  <div class="logo">
    <div class="logo-box">IP</div>
    <div>
      <div class="logo-text">InventoryPro</div>
    </div>
    <div class="logo-sub">Inventory Management</div>
  </div>
  <div class="global-search">
    <span class="gs-icon">🔍</span>
    <input type="text" placeholder="Search items, lots, GRNs, transfers, vendors..." id="globalSearch">
  </div>
  <div class="topbar-right">
    <div class="loc-pill" onclick="toggleLocSwitch(event)" style="position:relative">
      <span>📍</span><span id="curLocName">All Locations</span><span style="font-size:9px">▼</span>
    </div>
    <div class="cur-pill" onclick="toggleCurSwitch(event)" style="position:relative">
      <span id="curCurCode">MVR</span><span style="font-size:9px">▼</span>
    </div>
    <div class="urg-bell" onclick="go('alerts')">
      🔔<span class="urg-count" id="alertCount">0</span>
    </div>
    <div class="user-pill" onclick="toggleUserMenu(event)" style="position:relative">
      <div class="user-av" id="userAv">??</div>
      <div class="user-nm">
        <span id="userName">User</span>
        <small id="userRole">role</small>
      </div>
    </div>
  </div>
</div>

<div class="app-body">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

</div>

<div id="modals"></div>
<div id="toasts"></div>
<div id="popups"></div>

<!-- AI Assistant -->
<button class="ai-fab" id="aiFab" onclick="toggleAI()" style="display:none">✨</button>
<div id="aiPanel" style="display:none"></div>

<script>
/* ═══════════════════════════════════════════════════════
   STATE — All app data lives here. Every mutation goes
   through state functions, then re-renders.
   ═══════════════════════════════════════════════════════ */

const STATE = {
  // Current session
  currentUser: null,
  currentLocation: 'all',
  currentCurrency: 'MVR',
  currentPage: 'dashboard',

  // Demo users with roles & permissions
  users: [
    {id:'u1',name:'Ibrahim Rasheed',email:'ibrahim@company.mv',role:'Inventory Manager',avatar:'IR',color:'#2563eb',
     permissions:['view_all','create_item','edit_item','create_grn','post_grn','create_transfer','approve_transfer','create_adjustment','approve_adjustment_l1','approve_adjustment_l2','view_reports','manage_setup'],

/* ═══════════════════════════════════════════════════════
   AI REORDER ENGINE
   Calculates: avg daily consumption, lead time demand,
   safety stock, reorder point, suggested order qty.
   Uses simple stats — for production add ML/seasonality.
   ═══════════════════════════════════════════════════════ */

function calcReorderSuggestion(itemId){
  const item = STATE.items.find(i=>i.id===itemId);
  if(!item) return null;
  const consumption = STATE.consumption[itemId];
  if(!consumption) return null;

  // Avg monthly demand
  const avgMonthly = consumption.reduce((a,b)=>a+b,0)/consumption.length;
  const avgDaily = avgMonthly/30;

  // Trend - compare last 3 months vs prev 3 months
  const recent3 = consumption.slice(-3).reduce((a,b)=>a+b,0)/3;
  const prev3 = consumption.slice(0,3).reduce((a,b)=>a+b,0)/3;
  const trendPct = prev3>0 ? ((recent3-prev3)/prev3)*100 : 0;

  // Std dev for safety stock
  const variance = consumption.reduce((s,x)=>s+Math.pow(x-avgMonthly,2),0)/consumption.length;
  const stdDev = Math.sqrt(variance);
  const stdDevDaily = stdDev/30;

  // Lead time from primary vendor
  const vendorId = STATE.itemPrimaryVendor[itemId];
  const vendor = STATE.vendors.find(v=>v.id===vendorId);
  const leadTime = STATE.leadTimes[vendorId];
  const leadDays = leadTime ? leadTime.avgDays : 7;
  const leadVariability = leadTime ? Math.max(...leadTime.history)-Math.min(...leadTime.history) : 3;

  // Lead time demand = avg daily * lead days
  const leadTimeDemand = avgDaily * leadDays;

  // Safety stock - service level 95% (z=1.65)
  // SS = z * sqrt(LT*stdDev^2 + AvgDemand^2 * LTvariance^2)
  const z = 1.65;
  const safetyStock = z * Math.sqrt(leadDays*stdDevDaily*stdDevDaily + avgDaily*avgDaily*Math.pow(leadVariability/2,2));

  // Reorder point
  const reorderPoint = Math.ceil(leadTimeDemand + safetyStock);

  // Economic order qty (simplified - 1 month supply or to max)
  const eoq = Math.max(item.reorderQty, Math.ceil(avgMonthly));

  // Current stock total
  const currentStock = totalStock(itemId);
  const daysOfCover = avgDaily>0 ? currentStock/avgDaily : 999;

  // Urgency
  let urgency = 'ok';
  let urgencyReason = '';
  if(currentStock <= reorderPoint){
    urgency = currentStock <= safetyStock ? 'critical' : 'reorder';
    urgencyReason = currentStock===0 ? 'OUT OF STOCK' :
                    currentStock<=safetyStock ? `Below safety stock (${Math.ceil(safetyStock)})` :
                    `At/below reorder point (${reorderPoint})`;
  } else if(daysOfCover < leadDays*1.5){
    urgency = 'watch';
    urgencyReason = `Only ${daysOfCover.toFixed(0)} days cover, lead time ${leadDays}d`;
  }

  return {
    itemId,item,avgMonthly,avgDaily,trendPct,stdDev,vendor,leadDays,leadVariability,
    leadTimeDemand:Math.ceil(leadTimeDemand),safetyStock:Math.ceil(safetyStock),
    reorderPoint,eoq,currentStock,daysOfCover,urgency,urgencyReason
  };
}

function getAllReorderSuggestions(){
  return STATE.items
    .map(i=>calcReorderSuggestion(i.id))
    .filter(s=>s && s.urgency!=='ok')
    .sort((a,b)=>{
      const order={critical:0,reorder:1,watch:2};
      return order[a.urgency]-order[b.urgency];
    });
}

/* ═══════════════════════════════════════════════════════
   APPROVAL ENGINE
   ═══════════════════════════════════════════════════════ */

function getRequiredApprovals(docType, doc){
  const rules = STATE.approvalRules.filter(r=>r.doc===docType);
  let matched = null;
  for(const r of rules){
    if(r.condition==='always'){matched=r;break}
    if(r.condition.includes('value<') && doc.totalValue!==undefined){
      const v = Math.abs(doc.totalValue);
      const m = r.condition.match(/value<(\d+)/);
      if(m && v<parseInt(m[1])){matched=r;break}
    }
    if(r.condition.includes('value>=') && r.condition.includes('AND') && doc.totalValue!==undefined){
      const v = Math.abs(doc.totalValue);
      const m = r.condition.match(/value>=(\d+) AND value<(\d+)/);
      if(m && v>=parseInt(m[1]) && v<parseInt(m[2])){matched=r;break}
    }
    if(r.condition.startsWith('value>=') && !r.condition.includes('AND') && doc.totalValue!==undefined){
      const v = Math.abs(doc.totalValue);
      const m = r.condition.match(/value>=(\d+)/);
      if(m && v>=parseInt(m[1])){matched=r;break}
    }
    if(r.condition.startsWith('value>') && doc.totalValue!==undefined){
      const v = Math.abs(doc.totalValue);
      const m = r.condition.match(/value>(\d+)/);
      if(m && v>parseInt(m[1])){matched=r;break}
    }
    if(r.condition.startsWith('discrepancy>') && doc.discrepancyPct!==undefined){
      const m = r.condition.match(/discrepancy>(\d+)/);
      if(m && doc.discrepancyPct>parseInt(m[1])){matched=r;break}
    }
  }
  return matched || {levels:1,roles:['Inventory Manager']};
}

function canApprove(docType, doc){
  if(!STATE.currentUser) return false;
  const rule = getRequiredApprovals(docType, doc);
  if(!rule.roles.includes(STATE.currentUser.role)) return false;
  // Check current approval level needed
  const approvedCount = (doc.approvals||[]).filter(a=>a.action&&a.action.startsWith('Approved')).length;
  if(approvedCount >= rule.levels) return false;
  // Check if current user already approved
  const alreadyApproved = (doc.approvals||[]).some(a=>a.userId===STATE.currentUser.id && a.action&&a.action.startsWith('Approved'));
  if(alreadyApproved) return false;
  return true;
}

function approvalStatus(docType, doc){
  const rule = getRequiredApprovals(docType, doc);
  const approvedCount = (doc.approvals||[]).filter(a=>a.action && a.action.startsWith('Approved')).length;
  const rejected = (doc.approvals||[]).some(a=>a.action==='Rejected');
  if(rejected) return {state:'rejected',msg:'Rejected'};
  if(approvedCount >= rule.levels) return {state:'approved',msg:'Fully Approved',rule};
  return {state:'pending',msg:`Awaiting L${approvedCount+1} of ${rule.levels} (${rule.roles[approvedCount]||rule.roles[0]})`,rule,nextLevel:approvedCount+1};
}

   APPROVAL ACTIONS
   ═══════════════════════════════════════════════════════ */

function approveDoc(docType, docId){
  const note = prompt('Approval note (optional):','') || '';
  let doc, statusField='status';
  if(docType==='Adjustment') doc = STATE.adjustments.find(d=>d.id===docId);
  else if(docType==='GRN') doc = STATE.grns.find(d=>d.id===docId);
  else if(docType==='Transfer') doc = STATE.transfers.find(d=>d.id===docId);
  else if(docType==='Goods Request') doc = STATE.requests.find(d=>d.id===docId);
  if(!doc){toast('Document not found','err');return}

  // Build approval doc-context for canApprove
  let ctx = doc;
  if(docType==='GRN') ctx = {totalValue:grnTotal(doc)};
  if(docType==='Vendor Bill') ctx = {discrepancyPct:doc.discrepancy?doc.discrepancy/doc.amount*100:0};

  if(!canApprove(docType, ctx)){toast('You are not authorized to approve this','err');return}

  const rule = getRequiredApprovals(docType, ctx);
  const currentLevel = (doc.approvals||[]).filter(a=>a.action&&a.action.startsWith('Approved')).length + 1;

  doc.approvals = doc.approvals || [];
  doc.approvals.push({
    userId:STATE.currentUser.id,
    role:STATE.currentUser.role,
    action: rule.levels===1 ? 'Approved' : `Approved L${currentLevel}`,
    ts: now(),
    note
  });

  // Update status
  if(currentLevel >= rule.levels){
    if(docType==='Adjustment'){
      doc.status='Posted';
      postAdjustmentToStock(doc);
    } else if(docType==='GRN'){
      doc.status='Posted';
      postGrnToStock(doc);
    } else if(docType==='Transfer'){
      doc.status='In Transit';
    } else if(docType==='Goods Request'){
      doc.status='Approved';
    }
  } else {
    doc.status = `Pending Approval L${currentLevel+1}`;
  }
  toast(`${docType} ${docId} approved`,'ok');
  closeModal();
  render();
  renderSidebar();
}

function rejectDoc(docType, docId){
  const note = prompt('Rejection reason (required):','');
  if(!note){toast('Rejection reason required','err');return}
  let doc;
  if(docType==='Adjustment') doc = STATE.adjustments.find(d=>d.id===docId);
  else if(docType==='GRN') doc = STATE.grns.find(d=>d.id===docId);
  else if(docType==='Transfer') doc = STATE.transfers.find(d=>d.id===docId);
  else if(docType==='Goods Request') doc = STATE.requests.find(d=>d.id===docId);
  if(!doc){toast('Document not found','err');return}
  doc.approvals = doc.approvals || [];
  doc.approvals.push({userId:STATE.currentUser.id,role:STATE.currentUser.role,action:'Rejected',ts:now(),note});
  doc.status = 'Rejected';
  toast(`${docType} ${docId} rejected`,'warn');
  closeModal();
  render();
  renderSidebar();
}

function postAdjustmentToStock(adj){
  adj.lines.forEach(line=>{
    if(!STATE.stock[line.itemId]) STATE.stock[line.itemId]={};
    if(!STATE.stock[line.itemId][adj.location]) STATE.stock[line.itemId][adj.location]=0;
    STATE.stock[line.itemId][adj.location] += line.variance;
  });
}

function postGrnToStock(grn){
  grn.lines.forEach(line=>{
    if(!STATE.stock[line.itemId]) STATE.stock[line.itemId]={};
    if(!STATE.stock[line.itemId][grn.location]) STATE.stock[line.itemId][grn.location]=0;
    STATE.stock[line.itemId][grn.location] += line.recvQty;
  });
}

function grnTotal(grn){
  return grn.lines.reduce((s,l)=>s+(l.lineTotal||l.recvQty*l.unitCost),0) + (grn.freight||0)+(grn.duty||0)+(grn.insurance||0);
}

function statusBadge(s){
  if(s==='Posted'||s==='Approved'||s==='Matched') return 'b-ok';
  if(s==='Draft') return 'b-draft';
  if(s==='In Transit') return 'b-info';
  if(s==='Rejected') return 'b-bad';
  if(s.includes('Pending')) return 'b-warn';
  if(s==='Discrepancy') return 'b-bad';
  return 'b-draft';
}

    items = items.filter(i=>i.name.toLowerCase().includes(q)||i.sku.toLowerCase().includes(q)||i.barcodes.some(b=>b.toLowerCase().includes(q)));
  }
  if(itemCatFilter!=='all') items = items.filter(i=>i.category===itemCatFilter);

  $('main').innerHTML = `
    <div class="ph">
      <div>
        <div class="pt">Items</div>
        <div class="ps">${items.length} of ${STATE.items.length} items</div>
      </div>
      <div class="brow">
        <div class="search-bar"><input type="text" placeholder="Search name, SKU, barcode..." value="${escHtml(itemSearchTerm)}" oninput="itemSearchTerm=this.value;renderItems()"></div>
        <select class="sel" style="width:auto" onchange="itemCatFilter=this.value;renderItems()">
          <option value="all">All Categories</option>
          ${STATE.categories.map(c=>`<option value="${c.id}" ${itemCatFilter===c.id?'selected':''}>${escHtml(c.name)}</option>`).join('')}
        </select>
        <button class="btn">📤 Export</button>
        <button class="btn btn-p" onclick="openItemForm()">+ New Item</button>
      </div>
    </div>

    <div class="tbl-wrap">
      <div style="overflow-x:auto">
      <table class="tbl click">
        <thead>
          <tr>
            <th style="width:50px"></th>
            <th>Item Name</th>
            <th>SKU</th>
            <th>Category</th>
            <th>UOM</th>
            <th>Costing</th>
            <th class="txt-r">Avg Cost</th>
            <th class="txt-r">Total Stock</th>
            <th class="txt-r">Value</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(i=>{
            const stock = totalStock(i.id);
            const status = stockStatus(i.id);
            const cat = getCategory(i.category);
            return `<tr onclick="openItem('${i.id}')">
              <td>${i.pic1 ? `<img src="${i.pic1}" style="width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--border)">` : `<div style="width:36px;height:36px;border-radius:6px;background:var(--s3);display:flex;align-items:center;justify-content:center;color:var(--t3)">📦</div>`}</td>
              <td>
                <div style="font-weight:600">${escHtml(i.name)}</div>
                <div class="muted-s">${i.trackLot?'<span class="tag">LOT</span>':''}${i.trackExpiry?'<span class="tag">EXP</span>':''}${i.altUoms.length?`<span class="tag">${i.altUoms.length} UOMs</span>`:''}${i.barcodes.length>1?`<span class="tag">${i.barcodes.length} BARS</span>`:''}</div>
              </td>
              <td class="mono">${i.sku}</td>
              <td>${cat?escHtml(cat.name):'-'}</td>
              <td>${i.uom}</td>
              <td><span class="bdg b-info">${i.costMethod}</span></td>
              <td class="txt-r mono">${fmt(i.avgCost)}</td>
              <td class="txt-r mono"><strong>${fmtN(stock)}</strong></td>
              <td class="txt-r mono">${fmt(stock*i.avgCost)}</td>
              <td><span class="bdg ${status.cls}">${status.label}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
      ${items.length===0?'<div class="empty"><div class="ic">📦</div><div>No items match the filter</div></div>':''}
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════
   ITEM DETAIL MODAL — with all tabs

let itemModalTab = 'overview';

function openItem(itemId){
  itemModalTab = 'overview';
  showItemModal(itemId);
}

function showItemModal(itemId){
  const i = getItem(itemId);
  if(!i) return;
  const cat = getCategory(i.category);
  const stock = totalStock(itemId);
  const reorder = calcReorderSuggestion(itemId);

  modal(`
    <div class="mh">
      <div>
        <div class="mt">${escHtml(i.name)}</div>
        <div class="ms mono">${i.sku} · ${cat?escHtml(cat.name):''}</div>
      </div>
      <button class="mx" onclick="closeModal()">×</button>
    </div>
    <div class="mc">
      <div class="tabs">
        <button class="tab ${itemModalTab==='overview'?'active':''}" onclick="itemModalTab='overview';showItemModal('${itemId}')">Overview</button>
        <button class="tab ${itemModalTab==='stock'?'active':''}" onclick="itemModalTab='stock';showItemModal('${itemId}')">Stock by Location</button>
        <button class="tab ${itemModalTab==='lots'?'active':''}" onclick="itemModalTab='lots';showItemModal('${itemId}')">Lots</button>
        <button class="tab ${itemModalTab==='uoms'?'active':''}" onclick="itemModalTab='uoms';showItemModal('${itemId}')">UOMs & Barcodes</button>
        <button class="tab ${itemModalTab==='accounts'?'active':''}" onclick="itemModalTab='accounts';showItemModal('${itemId}')">📒 Accounts</button>
        <button class="tab ${itemModalTab==='reorder'?'active':''}" onclick="itemModalTab='reorder';showItemModal('${itemId}')">🤖 AI Reorder</button>
      </div>
      <div id="itemTabBody">${renderItemTab(i, itemModalTab, reorder)}</div>
    </div>
    <div class="mf">
      <button class="btn" onclick="closeModal()">Close</button>
      ${can('edit_item')?`<button class="btn btn-p" onclick="openItemForm('${itemId}')">Edit Item</button>`:''}
    </div>
  `, 'xl');
}

function renderItemTab(i, tab, reorder){

        <div>

            ${i.pic1?`<img src="${i.pic1}">`:`<div class="ph-txt">📦<br>No image</div>`}
          </div>
        </div>
        <div>
          <div class="lbl">Image 2</div>
          <div class="pic-slot" style="aspect-ratio:1;cursor:default">
            ${i.pic2?`<img src="${i.pic2}">`:`<div class="ph-txt">📦<br>No image</div>`}
          </div>
        </div>
        <div>
          <div class="card-flat">
            <div class="kv"><span class="k">Total Stock</span><span class="v mono">${fmtN(totalStock(i.id))} ${i.uom}</span></div>
            <div class="kv"><span class="k">Stock Value</span><span class="v mono">${fmt(totalStock(i.id)*i.avgCost)}</span></div>
            <div class="kv"><span class="k">Avg Cost (WAC)</span><span class="v mono">${fmt(i.avgCost)}</span></div>
            <div class="kv"><span class="k">Last Purchase</span><span class="v mono">${fmt(i.lastCost)}</span></div>
            <div class="kv"><span class="k">Sell Price</span><span class="v mono">${fmt(i.sellPrice)}</span></div>
            <div class="kv"><span class="k">Margin</span><span class="v">${((i.sellPrice-i.avgCost)/i.sellPrice*100).toFixed(1)}%</span></div>
          </div>
        </div>
      </div>
      <div class="g2">
        <div class="card-flat">
          <div class="lbl" style="margin-bottom:8px">Item Details</div>
          <div class="kv"><span class="k">Description</span><span class="v" style="text-align:right;max-width:60%">${escHtml(i.description||'—')}</span></div>
          <div class="kv"><span class="k">Category</span><span class="v">${escHtml((getCategory(i.category)||{name:'—'}).name)}</span></div>
          <div class="kv"><span class="k">Costing Method</span><span class="v"><span class="bdg b-info">${i.costMethod}</span></span></div>
          <div class="kv"><span class="k">Track Lot</span><span class="v">${i.trackLot?'✓ Yes':'No'}</span></div>
          <div class="kv"><span class="k">Track Expiry</span><span class="v">${i.trackExpiry?'✓ Yes':'No'}</span></div>
          <div class="kv"><span class="k">Weight</span><span class="v">${i.weight||'—'} kg</span></div>
          <div class="kv"><span class="k">Dimensions</span><span class="v">${escHtml(i.dimensions||'—')}</span></div>
        </div>
        <div class="card-flat">
          <div class="lbl" style="margin-bottom:8px">Reorder Settings</div>
          <div class="kv"><span class="k">Min Stock</span><span class="v mono">${fmtN(i.minStock)}</span></div>
          <div class="kv"><span class="k">Max Stock</span><span class="v mono">${fmtN(i.maxStock)}</span></div>
          <div class="kv"><span class="k">Reorder Qty</span><span class="v mono">${fmtN(i.reorderQty)}</span></div>
          <div class="kv"><span class="k">Primary Vendor</span><span class="v">${escHtml((STATE.vendors.find(v=>v.id===STATE.itemPrimaryVendor[i.id])||{name:'—'}).name)}</span></div>
          <div class="kv"><span class="k">Lead Time</span><span class="v">${(STATE.leadTimes[STATE.itemPrimaryVendor[i.id]]||{}).avgDays||'—'} days</span></div>
          <div class="kv"><span class="k">Status</span><span class="v"><span class="bdg ${i.active?'b-ok':'b-bad'}">${i.active?'Active':'Inactive'}</span></span></div>
        </div>
      </div>`;
  }

  if(tab==='stock'){
    return `<table class="tbl">
      <thead><tr><th>Location</th><th>Code</th><th class="txt-r">On Hand</th><th class="txt-r">Value</th><th>Status</th></tr></thead>
      <tbody>${STATE.locations.map(l=>{
        const q = (STATE.stock[i.id]||{})[l.id]||0;
        let st = q===0?'<span class="bdg b-bad">Out</span>':q<=i.minStock?'<span class="bdg b-warn">Low</span>':'<span class="bdg b-ok">OK</span>';
        return `<tr><td><strong>${escHtml(l.name)}</strong><div class="muted-s">${escHtml(l.address)}</div></td><td class="mono">${l.code}</td><td class="txt-r mono">${fmtN(q)} ${i.uom}</td><td class="txt-r mono">${fmt(q*i.avgCost)}</td><td>${st}</td></tr>`;
      }).join('')}</tbody>
    </table>`;
  }

  if(tab==='lots'){
    const lots = STATE.lots.filter(l=>l.itemId===i.id);
    if(!lots.length) return '<div class="empty"><div class="ic">📅</div><div>No lots tracked for this item</div><div class="muted-s">Enable lot tracking in item settings</div></div>';
    return `<table class="tbl">
      <thead><tr><th>Lot No</th><th>Location</th><th>Mfg Date</th><th>Exp Date</th><th>Days Left</th><th class="txt-r">Qty</th><th>Vendor</th></tr></thead>
      <tbody>${lots.map(l=>{
        const d = daysFrom(l.expDate);
        const expCls = d<0?'b-bad':d<30?'b-warn':d<90?'b-info':'b-ok';
        return `<tr><td class="mono"><strong>${l.lotNo}</strong></td><td>${escHtml((getLocation(l.locationId)||{name:'-'}).name)}</td><td>${l.mfgDate}</td><td>${l.expDate}</td><td><span class="bdg ${expCls}">${d<0?'Expired':d+'d'}</span></td><td class="txt-r mono">${fmtN(l.qty)}</td><td class="muted-s">${escHtml(l.vendor)}</td></tr>`;
      }).join('')}</tbody>
    </table>`;
  }

  if(tab==='uoms'){
    return `
      <div class="card-flat" style="margin-bottom:12px">
        <div class="lbl">Base UOM</div>
        <div style="font-size:16px;font-weight:700">${i.uom} <span class="muted-s">(${escHtml((STATE.uoms.find(u=>u.code===i.uom)||{name:''}).name)})</span></div>
      </div>
      <div class="lbl">Alternate UOMs</div>
      ${i.altUoms.length?`<table class="tbl"><thead><tr><th>UOM</th><th class="txt-r">Conversion</th><th>Barcode</th></tr></thead><tbody>${i.altUoms.map(u=>`<tr><td><strong>${u.uom}</strong></td><td class="txt-r mono">1 ${u.uom} = ${u.factor} ${i.uom}</td><td class="mono">${u.barcode||'-'}</td></tr>`).join('')}</tbody></table>`:'<div class="muted-s">No alternate UOMs</div>'}
      <div class="sep"></div>
      <div class="lbl">Barcodes (${i.barcodes.length})</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${i.barcodes.map(b=>`<span class="bdg b-sub" style="font-size:11px;padding:6px 12px"><span class="mono">${escHtml(b)}</span></span>`).join('')}</div>
    `;
  }

  if(tab==='accounts'){
    const asset = getAccount(i.glAsset);
    const cogs = getAccount(i.glCogs);
    const rev = getAccount(i.glRev);
    return `
      <div class="alert-banner" style="background:linear-gradient(135deg,#0d2d6e,#1849a9)">
        <div class="ic">💼</div>
        <div style="flex:1">
          <h4>GL Account Linking</h4>
          <p>These accounts are pulled from your Accounts module. Postings to inventory transactions auto-route to these ledgers.</p>
        </div>
      </div>
      <div class="g3">
        <div class="card-flat">
          <div class="lbl" style="color:var(--blue)">Inventory Asset Account</div>
          <div style="font-size:16px;font-weight:700;color:var(--blue);margin-top:4px">${i.glAsset||'—'}</div>
          <div style="font-weight:600;margin-top:2px">${asset?escHtml(asset.name):'<em>Not linked</em>'}</div>
          ${asset?`<div class="muted-s">${asset.type} · ${asset.category}</div>`:''}
          <div class="ftext">Debited on GRN, credited on issues</div>
        </div>
        <div class="card-flat">
          <div class="lbl" style="color:var(--orange)">COGS Account</div>
          <div style="font-size:16px;font-weight:700;color:var(--orange);margin-top:4px">${i.glCogs||'—'}</div>
          <div style="font-weight:600;margin-top:2px">${cogs?escHtml(cogs.name):'<em>Not linked</em>'}</div>
          ${cogs?`<div class="muted-s">${cogs.type} · ${cogs.category}</div>`:''}
          <div class="ftext">Debited on sale/issue</div>
        </div>
        <div class="card-flat">
          <div class="lbl" style="color:var(--green)">Sales Revenue Account</div>
          <div style="font-size:16px;font-weight:700;color:var(--green);margin-top:4px">${i.glRev||'—'}</div>
          <div style="font-weight:600;margin-top:2px">${rev?escHtml(rev.name):'<em>Not linked</em>'}</div>
          ${rev?`<div class="muted-s">${rev.type} · ${rev.category}</div>`:''}
          <div class="ftext">Credited on sale</div>
        </div>
      </div>
      <div class="sep"></div>
      <div class="card-flat">
        <div class="lbl">Sample Journal Entry — GRN of 10 units @ ${fmt(i.lastCost)}</div>
        <table class="tbl" style="margin-top:8px;background:var(--surface);border-radius:6px;overflow:hidden">
          <thead><tr><th>Account</th><th>Description</th><th class="txt-r">Debit</th><th class="txt-r">Credit</th></tr></thead>
          <tbody>
            <tr><td class="mono"><strong>${i.glAsset}</strong> ${asset?escHtml(asset.name):''}</td><td>Goods received - ${escHtml(i.sku)}</td><td class="txt-r mono">${fmt(i.lastCost*10)}</td><td></td></tr>
            <tr><td class="mono"><strong>2110</strong> Accounts Payable</td><td>Vendor liability</td><td></td><td class="txt-r mono">${fmt(i.lastCost*10)}</td></tr>
          </tbody>
        </table>
        <div class="ftext">Sent to PayFlow Pro as draft journal entry on GRN posting</div>
      </div>`;
  }

  if(tab==='reorder' && reorder){
    return `
      <div class="alert-banner">
        <div class="ic">🤖</div>
        <div style="flex:1">
          <h4>AI Reorder Analysis</h4>
          <p>Based on 6 months of consumption data and vendor lead time history</p>
        </div>
      </div>
      <div class="g3">
        <div class="card-flat">
          <div class="lbl">Demand Pattern</div>
          <div class="kv"><span class="k">Avg monthly</span><span class="v mono">${reorder.avgMonthly.toFixed(0)}</span></div>
          <div class="kv"><span class="k">Avg daily</span><span class="v mono">${reorder.avgDaily.toFixed(2)}</span></div>
          <div class="kv"><span class="k">Variability (σ)</span><span class="v mono">±${reorder.stdDev.toFixed(0)}/mo</span></div>
          <div class="kv"><span class="k">Trend (3mo)</span><span class="v" style="color:${reorder.trendPct>5?'var(--red)':reorder.trendPct<-5?'var(--green)':'var(--t2)'}">${reorder.trendPct>0?'+':''}${reorder.trendPct.toFixed(0)}%</span></div>
        </div>
        <div class="card-flat">
          <div class="lbl">Supply Chain</div>
          <div class="kv"><span class="k">Vendor</span><span class="v">${reorder.vendor?escHtml(reorder.vendor.name):'-'}</span></div>
          <div class="kv"><span class="k">Lead time</span><span class="v mono">${reorder.leadDays}d</span></div>
          <div class="kv"><span class="k">LT variability</span><span class="v mono">±${reorder.leadVariability}d</span></div>
          <div class="kv"><span class="k">Lead-time demand</span><span class="v mono">${reorder.leadTimeDemand}</span></div>
        </div>
        <div class="card-flat" style="border:2px solid var(--blue)">
          <div class="lbl" style="color:var(--blue)">AI Recommendation</div>
          <div class="kv"><span class="k">Safety stock</span><span class="v mono">${reorder.safetyStock}</span></div>
          <div class="kv"><span class="k">Reorder point</span><span class="v mono">${reorder.reorderPoint}</span></div>
          <div class="kv"><span class="k">Suggested qty</span><span class="v mono" style="color:var(--blue);font-size:14px">${fmtN(reorder.eoq)}</span></div>
          <div class="kv"><span class="k">Current cover</span><span class="v">${reorder.daysOfCover>999?'∞':reorder.daysOfCover.toFixed(0)+' days'}</span></div>
        </div>
      </div>
      <div class="sep"></div>
      ${reorder.urgency!=='ok'?`<button class="btn btn-p" style="width:100%" onclick="closeModal();createPOFromReorder('${i.id}',${reorder.eoq})">📤 Create Purchase Order for ${fmtN(reorder.eoq)} units →</button>`:'<div style="text-align:center;padding:16px;color:var(--green);font-weight:600">✓ Stock level healthy - no reorder needed</div>'}
    `;
  }
  return '';
}

function renderPicSlot(n, src){
  return `
    <label class="pic-slot ${src?'has-img':''}" style="cursor:pointer">
      <input type="file" accept="image/*" style="display:none" onchange="handlePicUpload(${n},event)">
      ${src ? `<img src="${src}"><button class="pic-rm" onclick="event.preventDefault();event.stopPropagation();removePic(${n})">×</button>` :
              `<div class="ph-txt">📷<br>Click to upload<br><span class="muted-s">Image ${n}</span></div>`}
    </label>`;
}

function handlePicUpload(slot, e){
  const file = e.target.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024){toast('Image too large - max 2MB','err');return}
  const reader = new FileReader();
  reader.onload = (ev)=>{
    if(slot===1) formPic1 = ev.target.result;
    else formPic2 = ev.target.result;
    // Re-render just the pic row
    const slots = document.querySelectorAll('.pic-row .pic-slot');
    if(slots[slot-1]){
      slots[slot-1].outerHTML = renderPicSlot(slot, slot===1?formPic1:formPic2);
      // Re-attach the handler for the new element
    }
    toast('Image '+slot+' uploaded','ok');
  };
  reader.readAsDataURL(file);
}

function removePic(n){
  if(n===1) formPic1=null;
  else formPic2=null;
  const slots = document.querySelectorAll('.pic-row .pic-slot');
  if(slots[n-1]) slots[n-1].outerHTML = renderPicSlot(n, null);
}

/* ═══════════════════════════════════════════════════════
   APPROVAL FLOW RENDER HELPER
   ═══════════════════════════════════════════════════════ */

function renderApprovalFlow(docType, doc){
  const ctx = docType==='GRN'?{totalValue:grnTotal(doc)}:doc;
  const rule = getRequiredApprovals(docType, ctx);
  const status = approvalStatus(docType, ctx);
  const approvals = doc.approvals||[];

  const steps = [];
  // Creator step
  if(approvals[0]){
    steps.push(`<div class="appr-step done">✓ ${escHtml(approvals[0].action)} • ${escHtml((getUser(approvals[0].userId)||{name:'-'}).name)}</div>`);
  }
  // Approval levels
  for(let lvl=1; lvl<=rule.levels; lvl++){
    const apprIdx = approvals.findIndex((a,idx)=>idx>0 && a.action&&a.action.startsWith('Approved'));
    const approvedAtLevel = approvals.filter(a=>a.action&&a.action.startsWith('Approved')).length;
    if(lvl <= approvedAtLevel){
      const a = approvals.filter(x=>x.action&&x.action.startsWith('Approved'))[lvl-1];
      steps.push(`<div class="appr-step done">✓ L${lvl} • ${escHtml(a?(getUser(a.userId)||{name:'-'}).name:'-')}</div>`);
    } else if(lvl === approvedAtLevel+1 && status.state==='pending'){
      steps.push(`<div class="appr-step cur">⏱ L${lvl} • ${escHtml(rule.roles[lvl-1]||rule.roles[0])}</div>`);
    } else {
      steps.push(`<div class="appr-step pend">L${lvl} • ${escHtml(rule.roles[lvl-1]||rule.roles[0])}</div>`);
    }
  }
  if(status.state==='rejected'){
    const r = approvals.find(a=>a.action==='Rejected');
    steps.push(`<div class="appr-step rej">✗ Rejected • ${escHtml((getUser(r.userId)||{name:'-'}).name)}</div>`);
  }

  const flow = steps.map((s,i)=>i<steps.length-1 ? s+'<span class="appr-arr">→</span>' : s).join('');

  return `
    <div class="card-flat" style="margin-bottom:14px">
      <div class="lbl" style="margin-bottom:8px">Approval Workflow • ${escHtml(rule.desc||'')}</div>
      <div class="appr-flow">${flow}</div>
      ${approvals.length?`<div style="margin-top:10px;font-size:11px;color:var(--t2)">
        <div class="lbl" style="margin-bottom:4px;font-size:9px">Audit Trail</div>
        ${approvals.map(a=>`<div style="padding:3px 0">• <strong>${escHtml(a.ts)}</strong> · ${escHtml((getUser(a.userId)||{name:'-'}).name)} <span class="muted-s">(${escHtml(a.role||'')})</span> — ${escHtml(a.action)}${a.note?`: <em>"${escHtml(a.note)}"</em>`:''}</div>`).join('')}
      </div>`:''}
    </div>
  `;
}

        <div class="card-flat"><div class="kv"><span class="k">Lines Total</span><span class="v mono">${fmt(g.lines.reduce((s,l)=>s+(l.lineTotal||l.recvQty*l.unitCost),0))}</span></div>

          <div class="kv"><span class="k">Duty</span><span class="v mono">${fmt(g.duty||0)}</span></div>
          <div class="kv"><span class="k">Insurance</span><span class="v mono">${fmt(g.insurance||0)}</span></div></div>
        <div class="card-flat" style="border:2px solid var(--blue)"><div class="kv"><span class="k">Absorption</span><span class="v">${g.absorptionMethod}</span></div>
          <div class="kv"><span class="k">Grand Total</span><span class="v mono" style="color:var(--blue);font-size:14px">${fmt(total)}</span></div></div>

        <tbody>${g.lines.map(l=>{
          const i = getItem(l.itemId);
          const lineTotal = l.lineTotal||l.recvQty*l.unitCost;
          const linesSubtotal = g.lines.reduce((s,x)=>s+(x.lineTotal||x.recvQty*x.unitCost),0);
          const overhead = (g.freight||0)+(g.duty||0)+(g.insurance||0);
          const absorbed = linesSubtotal>0 ? lineTotal/linesSubtotal*overhead : 0;
          const loaded = lineTotal+absorbed;
          const variance = l.poQty-l.recvQty;
          return `<tr><td>${escHtml(i.name)}<div class="muted-s mono">${i.sku}</div></td>
            <td>${l.uom}</td>

            <td class="txt-r mono">${fmt(lineTotal)}</td>
            <td class="txt-r mono"><strong>${fmt(loaded)}</strong><div class="muted-s">+${fmt(absorbed)}</div></td>
          </tr>`;
        }).join('')}</tbody>

      ${g.status==='Draft'&&can('post_grn')?`<button class="btn btn-p" onclick="submitGrnForApproval('${g.id}')">Submit for Approval</button>`:''}

}

function submitGrnForApproval(grnId){
  const g = STATE.grns.find(x=>x.id===grnId);
  if(!g) return;
  const total = grnTotal(g);
  const rule = getRequiredApprovals('GRN',{totalValue:total});
  if(rule.levels === 0 || rule.condition==='value>50000' && total<=50000){
    // No approval needed - post directly
    g.status = 'Posted';
    postGrnToStock(g);
    g.approvals.push({userId:STATE.currentUser.id,role:STATE.currentUser.role,action:'Auto-Posted',ts:now(),note:'No approval required'});
    toast(`GRN ${grnId} posted to stock`,'ok');
  } else {
    g.status = 'Pending Approval';
    toast(`GRN ${grnId} submitted for approval`,'ok');
  }
  closeModal();
  render();
  renderSidebar();
}

function receiveTransfer(id){
  const t = STATE.transfers.find(x=>x.id===id);
  if(!t) return;
  t.lines.forEach(l=>{
    if(!STATE.stock[l.itemId][t.fromLoc]) STATE.stock[l.itemId][t.fromLoc]=0;
    if(!STATE.stock[l.itemId][t.toLoc]) STATE.stock[l.itemId][t.toLoc]=0;
    STATE.stock[l.itemId][t.fromLoc] -= l.qty;
    STATE.stock[l.itemId][t.toLoc] += l.qty;
  });
  t.status = 'Posted';
  t.approvals.push({userId:STATE.currentUser.id,role:STATE.currentUser.role,action:'Received',ts:now()});
  toast(`Transfer ${id} received - stock updated`,'ok');
  closeModal();
  render();
}

function addAdjLine(){
  adjLines.push({itemId:STATE.items[0].id, countQty:0});
  renderAdjLines();
}

function renderAdjLines(){
  const loc = $('aLoc')?$('aLoc').value:STATE.locations[0].id;
  $('adjLinesBody').innerHTML = `<table class="tbl">
    <thead><tr><th>Item</th><th class="txt-r">System Qty</th><th class="txt-r">Actual Count</th><th class="txt-r">Variance</th><th class="txt-r">Value</th><th></th></tr></thead>
    <tbody>${adjLines.map((l,idx)=>{
      const it = getItem(l.itemId);
      const sysQty = (STATE.stock[l.itemId]||{})[loc]||0;
      const variance = (l.countQty||0)-sysQty;
      const value = variance*it.avgCost;
      return `<tr><td><select class="sel" onchange="adjLines[${idx}].itemId=this.value;renderAdjLines()">
        ${STATE.items.map(i=>`<option value="${i.id}" ${l.itemId===i.id?'selected':''}>${escHtml(i.name)}</option>`).join('')}</select></td>
        <td class="txt-r mono">${fmtN(sysQty)}</td>
        <td><input class="inp mono txt-r" type="number" value="${l.countQty}" onchange="adjLines[${idx}].countQty=parseFloat(this.value);renderAdjLines()"></td>
        <td class="txt-r mono" style="color:${variance<0?'var(--red)':variance>0?'var(--green)':'var(--t3)'};font-weight:700">${variance>0?'+':''}${variance}</td>
        <td class="txt-r mono" style="color:${value<0?'var(--red)':'var(--green)'}">${fmt(value)}</td>
        <td><button class="btn btn-xs btn-r" onclick="adjLines.splice(${idx},1);renderAdjLines()">×</button></td></tr>`;
    }).join('')}</tbody></table>`;
}

function saveAdjustment(){
  if(adjLines.length===0){toast('Add at least one line','err');return}
  const loc = $('aLoc').value;
  const lines = adjLines.map(l=>{
    const it = getItem(l.itemId);
    const systemQty = (STATE.stock[l.itemId]||{})[loc]||0;
    const variance = l.countQty - systemQty;
    return {itemId:l.itemId,systemQty,countQty:l.countQty,variance,unitCost:it.avgCost,value:variance*it.avgCost};
  });
  const totalValue = lines.reduce((s,l)=>s+l.value,0);
  const newAdj = {
    id: uid('ADJ'),
    date: $('aDate').value,
    location: loc,
    reasonCode: $('aReason').value,
    createdBy: STATE.currentUser.id,
    status:'Pending Approval',
    lines,
    totalValue,
    approvals:[{userId:STATE.currentUser.id,role:STATE.currentUser.role,action:'Created',ts:now(),note:$('aNotes').value}]
  };
  STATE.adjustments.push(newAdj);

  // Check if needs L2
  const rule = getRequiredApprovals('Adjustment', newAdj);
  if(rule.levels>1) newAdj.status = `Pending Approval L1`;
  toast(`Adjustment ${newAdj.id} submitted (needs ${rule.levels} approval level${rule.levels>1?'s':''})`,'ok');
  closeModal();
  go('adjustments');
}

function generateBarcodeSVG(text, w, h){
  if(!text) text='000000';
  let bars='';
  let x=0;
  const barWidths=[1,2,1,2,1,3,1,2,3,1,2];
  for(let i=0;i<text.length;i++){
    const c = text.charCodeAt(i);
    const bw = barWidths[c%barWidths.length];
    bars += `<rect x="${x}" y="5" width="${bw}" height="${h-15}" fill="#000"/>`;
    x += bw + 1;
    if(x>w-10) break;
  }
  return `<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg"><rect width="${w}" height="${h}" fill="#fff"/>${bars}</svg>`;
}

/* ═══════════════════════════════════════════════════════

let aiOpen = false;
const aiHistory = [];

function toggleAI(){
  aiOpen = !aiOpen;
  if(aiOpen){
    $('aiPanel').style.display='flex';
    $('aiFab').style.display='none';
    if(!$('aiPanel').innerHTML){
      $('aiPanel').className='ai-panel';
      $('aiPanel').innerHTML = `
        <div class="ai-h">
          <div><div class="ai-h-t">✨ Inventory AI Assistant</div><div class="ai-h-s">Ask about stock, reorders, costs, anything</div></div>
          <button class="mx" style="color:#fff" onclick="toggleAI()">×</button>
        </div>
        <div class="ai-msgs" id="aiMsgs">
          <div class="ai-m a">Hi ${escHtml(STATE.currentUser.name.split(' ')[0])}! I'm your inventory AI. I can help with:<br><br>• <strong>Reorder analysis</strong> — "What should I reorder this week?"<br>• <strong>Stock queries</strong> — "How many Coke cans do we have?"<br>• <strong>Cost analysis</strong> — "Which items lost most value?"<br>• <strong>Vendor info</strong> — "Who is fastest on deliveries?"<br><br>What would you like to know?</div>
        </div>
        <div class="ai-in">
          <input type="text" id="aiInput" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendAI()">
          <button onclick="sendAI()">Send</button>
        </div>`;
    }
  } else {
    $('aiPanel').style.display='none';
    $('aiFab').style.display='flex';
  }
}

function aiAddMsg(text, type){
  const m = document.createElement('div');
  m.className = 'ai-m '+type;
  m.innerHTML = text;
  $('aiMsgs').appendChild(m);
  $('aiMsgs').scrollTop = $('aiMsgs').scrollHeight;
}

async function sendAI(){
  const inp = $('aiInput');
  const q = inp.value.trim();
  if(!q) return;
  aiAddMsg(escHtml(q),'u');
  inp.value='';
  aiHistory.push({role:'user',content:q});

  const status = document.createElement('div');
  status.className='ai-m s';
  status.textContent='Thinking...';
  $('aiMsgs').appendChild(status);

  // Build inventory context
  const ctx = buildAIContext();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        system:`You are an inventory management AI assistant for InventoryPro. You have access to the user's live inventory data. Be concise and practical. User is ${STATE.currentUser.name} (${STATE.currentUser.role}). Current location: ${STATE.currentLocation==='all'?'All Locations':getLocation(STATE.currentLocation).name}. Use Maldivian Rufiyaa (Rf) for currency. \n\nINVENTORY DATA:\n${ctx}`,
        messages: aiHistory.map(m=>({role:m.role,content:m.content}))
      })
    });
    const data = await res.json();
    status.remove();
    const reply = data.content && data.content[0] ? data.content[0].text : 'No response';
    aiHistory.push({role:'assistant',content:reply});
    aiAddMsg(reply.replace(/\n/g,'<br>'),'a');
  } catch(e){
    status.remove();
    aiAddMsg(localAIReply(q),'a');
  }
}

function buildAIContext(){
  const lowStock = STATE.items.filter(i=>{const t=totalStock(i.id);return t>0&&t<=i.minStock}).map(i=>`${i.sku} ${i.name}: ${totalStock(i.id)} (min ${i.minStock})`);
  const outOfStock = STATE.items.filter(i=>totalStock(i.id)===0).map(i=>`${i.sku} ${i.name}`);
  const reorders = getAllReorderSuggestions().slice(0,5).map(s=>`${s.item.sku} ${s.item.name}: have ${s.currentStock}, reorder ${s.eoq}, ${s.urgency}`);
  const pendingApr = myPendingApprovals();

  return `Total items: ${STATE.items.length}
Total stock value: Rf ${STATE.items.reduce((s,i)=>s+totalStock(i.id)*i.avgCost,0).toFixed(0)}
Low stock items: ${lowStock.length>0?lowStock.slice(0,5).join('; '):'none'}
Out of stock: ${outOfStock.length>0?outOfStock.slice(0,5).join('; '):'none'}
Top reorder suggestions: ${reorders.join('; ')}
My pending approvals: ${pendingApr}
Locations: ${STATE.locations.map(l=>l.code).join(', ')}
Item samples (first 5): ${STATE.items.slice(0,5).map(i=>`${i.sku} ${i.name} stock=${totalStock(i.id)} cost=Rf${i.avgCost}`).join('; ')}`;
}

function localAIReply(q){
  const ql = q.toLowerCase();
  if(ql.includes('reorder')||ql.includes('what should')){
    const s = getAllReorderSuggestions();
    if(!s.length) return 'Stock levels look healthy - no urgent reorders needed.';
    return `Top reorder priorities:<br><br>${s.slice(0,5).map(x=>`• <strong>${escHtml(x.item.name)}</strong>: ${x.currentStock} on hand → reorder ${fmtN(x.eoq)} (${x.urgency})`).join('<br>')}<br><br>Click 🤖 AI Reorder in the sidebar for full analysis.`;
  }
  if(ql.includes('low stock')||ql.includes('out of stock')){
    const low = STATE.items.filter(i=>totalStock(i.id)<=i.minStock);
    return low.length ? `${low.length} items at or below min level:<br>${low.slice(0,8).map(i=>`• ${escHtml(i.name)}: ${totalStock(i.id)} ${i.uom}`).join('<br>')}` : 'No low stock items.';
  }
  if(ql.includes('expir')){
    const exp = STATE.lots.filter(l=>daysFrom(l.expDate)<=30).sort((a,b)=>daysFrom(a.expDate)-daysFrom(b.expDate));
    return exp.length ? `${exp.length} lots expire within 30 days:<br>${exp.slice(0,6).map(l=>`• ${l.lotNo} (${escHtml(getItem(l.itemId).name)}): ${daysFrom(l.expDate)}d left`).join('<br>')}` : 'No urgent expiries.';
  }
  if(ql.includes('approv')){
    return `You have ${myPendingApprovals()} pending approvals. Click "My Approvals" in sidebar to review.`;
  }
  if(ql.includes('value')||ql.includes('worth')){
    const v = STATE.items.reduce((s,i)=>s+totalStock(i.id)*i.avgCost,0);
    return `Total inventory value: <strong>${fmt(v)}</strong> across ${STATE.items.length} items at ${STATE.locations.length} locations.`;
  }
  return `I can help with reorder suggestions, stock levels, expiries, approvals, and valuations. Try asking "What should I reorder?" or "Show low stock items."`;
}
