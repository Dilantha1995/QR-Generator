<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Label Generator</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a1f2e;
    --panel-2: #232a3d;
    --border: #2d3548;
    --text: #e8ecf4;
    --muted: #8b94a8;
    --accent: #5eead4;
    --accent-2: #38bdf8;
    --danger: #f87171;
    --warn: #fbbf24;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }
  /* ============== APP LAYOUT (screen) ============== */
  .app {
    display: grid;
    grid-template-columns: 1fr 420px;
    gap: 20px;
    padding: 20px;
    max-width: 1600px;
    margin: 0 auto;
    min-height: 100vh;
  }
  header {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  header h1 span { color: var(--accent); }
  header .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 2px;
  }
  .header-stats {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--muted);
  }
  .header-stats b { color: var(--accent-2); font-weight: 600; }

  /* ============== LEFT PANEL ============== */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    box-shadow: var(--shadow);
  }
  .panel h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .search-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .filter-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .pill {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pill:hover { color: var(--text); }
  .pill.active {
    background: var(--accent);
    color: #0a0e14;
    border-color: var(--accent);
    font-weight: 600;
  }
  .results {
    max-height: 60vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
  }
  .results::-webkit-scrollbar { width: 8px; }
  .results::-webkit-scrollbar-track { background: var(--bg); }
  .results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .item-row {
    display: grid;
    grid-template-columns: 110px 1fr 100px 70px;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.1s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: var(--panel-2); }
  .item-code {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 12px;
    color: var(--accent-2);
    font-weight: 500;
  }
  .item-name {
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item-brand {
    font-size: 11px;
    color: var(--muted);
    background: var(--panel-2);
    padding: 3px 8px;
    border-radius: 10px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .btn {
    background: var(--accent);
    color: #0a0e14;
    border: none;
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover:not(:disabled) { background: #4dd0c0; transform: translateY(-1px); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
  }
  .btn:disabled:hover { background: var(--accent); transform: none; }
  .btn-secondary:disabled:hover { background: var(--panel-2); }
  .btn-secondary {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger {
    background: var(--danger);
    color: white;
  }
  .btn-danger:hover { background: #ef5050; }
  .btn-large {
    padding: 12px 24px;
    font-size: 14px;
  }
  .btn-full { width: 100%; }
  .no-results {
    padding: 30px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .no-results .add-new-link {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    margin-top: 6px;
    display: inline-block;
  }

  /* ============== RIGHT PANEL: CART ============== */
  .cart-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
    height: fit-content;
    position: sticky;
    top: 20px;
    max-height: calc(100vh - 40px);
  }
  .cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .cart-header h2 { margin: 0; }
  .cart-count {
    background: var(--accent);
    color: #0a0e14;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
  }
  .cart-items {
    flex: 1;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    margin-bottom: 12px;
    min-height: 200px;
    max-height: 50vh;
  }
  .cart-items::-webkit-scrollbar { width: 8px; }
  .cart-items::-webkit-scrollbar-track { background: var(--bg); }
  .cart-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .cart-row {
    display: grid;
    grid-template-columns: 1fr 80px 30px;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .cart-row:last-child { border-bottom: none; }
  .cart-info { min-width: 0; }
  .cart-info .name {
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cart-info .code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent-2);
    margin-top: 2px;
  }
  .qty-control {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--panel-2);
    border-radius: 5px;
    padding: 2px;
  }
  .qty-btn {
    background: transparent;
    border: none;
    color: var(--text);
    width: 22px;
    height: 22px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 3px;
  }
  .qty-btn:hover { background: var(--border); }
  .qty-value {
    flex: 1;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    min-width: 22px;
  }
  .remove-btn {
    background: transparent;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 4px;
  }
  .cart-empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .cart-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .summary {
    background: var(--panel-2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .summary b { color: var(--text); font-weight: 600; }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--panel-2);
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 8px;
    user-select: none;
    transition: color 0.15s;
  }
  .toggle-row:hover { color: var(--text); }
  .toggle-row input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* ============== MODAL ============== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--panel);
    border-radius: 12px;
    padding: 24px;
    width: 90%;
    max-width: 460px;
    border: 1px solid var(--border);
  }
  .modal h3 {
    margin-bottom: 16px;
    font-size: 18px;
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 18px;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #0a0e14;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .custom-tag {
    background: var(--warn);
    color: #0a0e14;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 6px;
    font-weight: 700;
    vertical-align: middle;
  }

  /* ============== PRINT VIEW (24 labels per A4) ============== */
  /* A4 = 210mm × 297mm. 24 labels = 3 cols × 8 rows.
     Each label = 63.5mm × 34mm.
     Inner layout: QR fills the left 17mm full-height column; the right
     column stacks name/brand/code on top and barcode at the bottom. */
  .print-area { display: none; }
  @media print {
    @page {
      size: A4 portrait;
      margin: 0;
    }
    html, body {
      background: white !important;
      margin: 0 !important;
      padding: 0 !important;
      width: 210mm;
    }
    .app, header, .print-controls, .toast, .modal-overlay { display: none !important; }
    .print-area {
      display: block !important;
      background: white;
      margin: 0;
      padding: 0;
      width: 210mm;
      min-height: auto;
    }
    .print-page {
      width: 210mm;
      height: 296mm;
      padding: 12.5mm 7.25mm;
      margin: 0;
      box-sizing: border-box;
      background: white;
      box-shadow: none !important;
      overflow: hidden;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .print-page + .print-page {
      page-break-before: always;
      break-before: page;
    }
    .label-grid {
      display: grid;
      grid-template-columns: repeat(3, 63.5mm);
      grid-template-rows: repeat(8, 34mm);
      column-gap: 2.5mm;
      row-gap: 0;
      width: 100%;
    }
    .label {
      width: 63.5mm;
      height: 34mm;
      padding: 1.8mm;
      border: 0.2mm dashed #999 !important;
      page-break-inside: avoid;
      break-inside: avoid;
      overflow: hidden;
      display: grid;
      grid-template-columns: 17mm 1fr;
      grid-template-rows: 1fr;
      gap: 1.2mm;
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    body.no-cut-marks .label { border: none !important; }
  }
  /* On-screen preview when "Preview" mode is on (before printing) */
  .print-preview-mode .app { display: none; }
  .print-preview-mode header { display: none; }
  .print-preview-mode .print-area {
    display: block;
    background: #d0d4dc;
    min-height: 100vh;
    padding: 20px 0;
  }
  .print-preview-mode .print-page {
    width: 210mm;
    height: 297mm;
    background: white;
    color: #000;
    margin: 0 auto 20px;
    padding: 12.5mm 7.25mm;
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
    box-sizing: border-box;
    overflow: hidden;
  }
  .print-preview-mode .label-grid {
    display: grid;
    grid-template-columns: repeat(3, 63.5mm);
    grid-template-rows: repeat(8, 34mm);
    column-gap: 2.5mm;
    row-gap: 0;
  }
  .print-preview-mode .label {
    width: 63.5mm;
    height: 34mm;
    padding: 1.8mm;
    box-sizing: border-box;
    overflow: hidden;
    display: grid;
    grid-template-columns: 17mm 1fr;
    grid-template-rows: 1fr;
    gap: 1.2mm;
    border: 0.2mm dashed #ccc;
  }
  /* Label inner content — QR fills left column, right column stacks info on top
     and barcode at bottom. */
  .label .qr-cell {
    grid-column: 1;
    grid-row: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .label .qr-cell svg,
  .label .qr-cell img,
  .label .qr-cell canvas {
    width: 17mm !important;
    height: 17mm !important;
    display: block;
  }
  .label .qr-cell svg rect { shape-rendering: crispEdges; }
  .label .info-stack {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }
  .label .info {
    flex: 1;
    color: #000;
    overflow: hidden;
    min-height: 0;
  }
  .label .info .item-name-print {
    font-size: 6.8pt;
    font-weight: 700;
    line-height: 1.1;
    color: #000;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
    font-family: Arial, Helvetica, sans-serif;
  }
  .label .info .brand-print {
    font-size: 5.5pt;
    color: #555;
    margin-top: 0.3mm;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .label .info .code-print {
    font-size: 5.5pt;
    color: #888;
    font-family: 'Courier New', monospace;
    margin-top: 0.2mm;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .label .barcode-cell {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 8mm;
    overflow: hidden;
    margin-top: 0.5mm;
  }
  .label .barcode-cell svg {
    width: 100%;
    height: 100%;
    max-height: 8mm;
  }
  .print-controls {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 200;
    display: flex;
    gap: 8px;
  }
  body:not(.print-preview-mode) .print-controls { display: none; }
  @media print { .print-controls { display: none !important; } }

  /* Mobile responsive */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .cart-panel { position: static; max-height: none; }
  }
</style>
</head>
<body>

<div class="app" id="app">
  <header>
    <div>
      <h1>Inventory <span>Label</span> Generator</h1>
      <div class="subtitle">QR + Barcode labels, 24 per A4 sheet</div>
    </div>
    <div class="header-stats">
      <div>Catalog: <b id="totalItems">0</b> items</div>
      <div>Custom: <b id="customItems">0</b> items</div>
    </div>
  </header>

  <!-- LEFT: Search & catalog -->
  <div class="panel">
    <h2>1. Search Catalog</h2>
    <div class="search-row">
      <input type="text" id="searchBox" class="search-input"
             placeholder="Search by item code, name, or brand...">
      <button class="btn btn-secondary" onclick="openAddItemModal()">+ Add New</button>
    </div>
    <div class="filter-pills" id="brandFilters"></div>
    <div class="results" id="results"></div>
  </div>

  <!-- RIGHT: Cart -->
  <div class="cart-panel">
    <div class="cart-header">
      <h2>2. Print Queue</h2>
      <span class="cart-count" id="cartCount">0</span>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">Add items from the left to build your print queue.</div>
    </div>
    <div class="summary">
      <span>Total labels:</span>
      <b><span id="totalLabels">0</span> / <span id="sheetsNeeded">0</span> sheet(s)</b>
    </div>
    <label class="toggle-row" for="cutMarksToggle" title="Show dashed lines around each label to help with cutting">
      <input type="checkbox" id="cutMarksToggle" checked onchange="toggleCutMarks(this.checked)">
      <span>Show cutting marks on print</span>
    </label>
    <div class="cart-actions">
      <button class="btn btn-large btn-full" onclick="generatePrintView()" id="printBtn" disabled>
        Generate &amp; Print Labels
      </button>
      <button class="btn btn-secondary btn-full" onclick="generatePrintView(true)" id="previewBtn" disabled>
        Preview Sheet
      </button>
      <button class="btn btn-secondary btn-full" onclick="clearCart()" id="clearBtn" disabled>
        Clear Queue
      </button>
    </div>
  </div>
</div>

<!-- PRINT AREA (hidden until preview/print) -->
<div class="print-area" id="printArea"></div>

<!-- Print controls (shown during preview only) -->
<div class="print-controls">
  <button class="btn btn-secondary" onclick="closePrintView()">← Back to Editor</button>
  <button class="btn btn-large" onclick="window.print()">Print Now</button>
</div>

<!-- ADD NEW ITEM MODAL -->
<div class="modal-overlay" id="addItemModal">
  <div class="modal">
    <h3 id="modalTitle">Add New Item</h3>
    <div class="form-group">
      <label>Item Code *</label>
      <input type="text" id="newItemCode" placeholder="e.g., 2024-NEW-001">
    </div>
    <div class="form-group">
      <label>Item Name *</label>
      <input type="text" id="newItemName" placeholder="e.g., New Reagent Pack">
    </div>
    <div class="form-group">
      <label>Brand</label>
      <input type="text" id="newItemBrand" placeholder="e.g., Vitros" list="brandSuggestions">
      <datalist id="brandSuggestions"></datalist>
    </div>
    <div class="form-group">
      <label>Sub-category (optional)</label>
      <input type="text" id="newItemSubCat" placeholder="e.g., Reagents">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeAddItemModal()">Cancel</button>
      <button class="btn" onclick="saveNewItem()">Add &amp; Queue</button>
    </div>
  </div>

<script>
/* ============== STATE ============== */
const LABELS_PER_PAGE = 24;  // 3 cols × 8 rows on A4
const INVENTORY = JSON.parse(document.getElementById('inventoryData').textContent);
let customItems = [];
let cart = [];
let activeBrand = 'All';
let searchQuery = '';

// Load persisted state
try {
  const saved = localStorage.getItem('labelTool_customItems');
  if (saved) customItems = JSON.parse(saved);
} catch (e) {}
try {
  const saved = localStorage.getItem('labelTool_cart');
  if (saved) cart = JSON.parse(saved);
} catch (e) {}

function persist() {
  localStorage.setItem('labelTool_customItems', JSON.stringify(customItems));
  localStorage.setItem('labelTool_cart', JSON.stringify(cart));
}

function toggleCutMarks(enabled) {
  if (enabled) {
    document.body.classList.remove('no-cut-marks');
  } else {
    document.body.classList.add('no-cut-marks');
  }
  localStorage.setItem('labelTool_cutMarks', enabled ? '1' : '0');
}

// Restore cutMarks preference on load
(function restoreCutMarks() {
  const pref = localStorage.getItem('labelTool_cutMarks');
  if (pref === '0') {
    document.body.classList.add('no-cut-marks');
    // Update checkbox after DOM ready
    document.addEventListener('DOMContentLoaded', () => {
      const cb = document.getElementById('cutMarksToggle');
      if (cb) cb.checked = false;
    });
  }
})();

function allItems() {
  return INVENTORY.concat(customItems);
}

/* ============== UI: STATS ============== */
function updateStats() {
  document.getElementById('totalItems').textContent = INVENTORY.length;
  document.getElementById('customItems').textContent = customItems.length;
}

/* ============== UI: BRAND FILTERS ============== */
function renderBrandFilters() {
  const brands = {};
  allItems().forEach(i => { brands[i.b] = (brands[i.b] || 0) + 1; });
  const sorted = Object.entries(brands).sort((a,b) => b[1] - a[1]);
  const container = document.getElementById('brandFilters');
  container.innerHTML = '';
  const allPill = document.createElement('div');
  allPill.className = 'pill' + (activeBrand === 'All' ? ' active' : '');
  allPill.textContent = `All (${allItems().length})`;
  allPill.onclick = () => { activeBrand = 'All'; renderBrandFilters(); renderResults(); };
  container.appendChild(allPill);
  sorted.forEach(([brand, count]) => {
    const p = document.createElement('div');
    p.className = 'pill' + (activeBrand === brand ? ' active' : '');
    p.textContent = `${brand} (${count})`;
    p.onclick = () => { activeBrand = brand; renderBrandFilters(); renderResults(); };
    container.appendChild(p);
  });

  // Update datalist for new-item form too
  const dl = document.getElementById('brandSuggestions');
  dl.innerHTML = '';
  sorted.forEach(([brand]) => {
    const opt = document.createElement('option');
    opt.value = brand;
    dl.appendChild(opt);
  });
}

/* ============== UI: RESULTS ============== */
function renderResults() {
  const q = searchQuery.trim().toLowerCase();
  let items = allItems();
  if (activeBrand !== 'All') items = items.filter(i => i.b === activeBrand);
  if (q) {
    items = items.filter(i =>
      i.c.toLowerCase().includes(q) ||
      i.n.toLowerCase().includes(q) ||
      (i.b && i.b.toLowerCase().includes(q))
    );
  }
  // Custom items first
  items.sort((a, b) => {
    const ac = a.custom ? 0 : 1;
    const bc = b.custom ? 0 : 1;
    return ac - bc;
  });

  const r = document.getElementById('results');
  if (items.length === 0) {
    r.innerHTML = `
      <div class="no-results">
        No items match "<b>${escapeHtml(searchQuery)}</b>".<br>
        <span class="add-new-link" onclick="prefillAndAdd('${escapeAttr(searchQuery)}')">
          + Add "${escapeHtml(searchQuery)}" as a new item
        </span>
      </div>`;
    return;
  }
  r.innerHTML = items.slice(0, 200).map(i => `
    <div class="item-row">
      <div class="item-code">${escapeHtml(i.c)}${i.custom ? '<span class="custom-tag">NEW</span>' : ''}</div>
      <div class="item-name" title="${escapeHtml(i.n)}">${escapeHtml(i.n)}</div>
      <div class="item-brand" title="${escapeHtml(i.b)}">${escapeHtml(i.b)}</div>
      <button class="btn" onclick="addToCart('${escapeAttr(i.c)}')">Add</button>
    </div>
  `).join('') + (items.length > 200 ? `<div class="no-results">Showing first 200 of ${items.length}. Refine your search.</div>` : '');
}

/* ============== CART ============== */
function findItem(code) {
  return allItems().find(i => i.c === code);
}

function addToCart(code) {
  const item = findItem(code);
  if (!item) return;
  const existing = cart.find(c => c.c === code);
  if (existing) existing.qty += 1;
  else cart.push({ c: item.c, n: item.n, b: item.b, qty: 1 });
  persist();
  renderCart();
  toast(`Added: ${item.n.substring(0, 30)}${item.n.length > 30 ? '…' : ''}`);
}

function changeQty(code, delta) {
  const item = cart.find(c => c.c === code);
  if (!item) return;
  item.qty = Math.max(1, item.qty + delta);
  persist();
  renderCart();
}

function setQty(code, val) {
  const n = parseInt(val) || 1;
  const item = cart.find(c => c.c === code);
  if (!item) return;
  item.qty = Math.max(1, Math.min(999, n));
  persist();
  renderCart();
}

function removeFromCart(code) {
  cart = cart.filter(c => c.c !== code);
  persist();
  renderCart();
}

function clearCart() {
  if (cart.length === 0) return;
  if (!confirm('Clear the entire print queue?')) return;
  cart = [];
  persist();
  renderCart();
  toast('Queue cleared');
}

function renderCart() {
  const container = document.getElementById('cartItems');
  if (cart.length === 0) {
    container.innerHTML = '<div class="cart-empty">Add items from the left to build your print queue.</div>';
  } else {
    container.innerHTML = cart.map(c => `
      <div class="cart-row">
        <div class="cart-info">
          <div class="name" title="${escapeHtml(c.n)}">${escapeHtml(c.n)}</div>
          <div class="code">${escapeHtml(c.c)} · ${escapeHtml(c.b)}</div>
        </div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty('${escapeAttr(c.c)}', -1)">−</button>
          <span class="qty-value">${c.qty}</span>
          <button class="qty-btn" onclick="changeQty('${escapeAttr(c.c)}', 1)">+</button>
        </div>
        <button class="remove-btn" onclick="removeFromCart('${escapeAttr(c.c)}')" title="Remove">×</button>
      </div>
    `).join('');
  }
  const totalLabels = cart.reduce((s, c) => s + c.qty, 0);
  const sheets = Math.ceil(totalLabels / LABELS_PER_PAGE);
  document.getElementById('cartCount').textContent = cart.length;
  document.getElementById('totalLabels').textContent = totalLabels;
  document.getElementById('sheetsNeeded').textContent = sheets;
  const hasItems = totalLabels > 0;
  document.getElementById('printBtn').disabled = !hasItems;
  document.getElementById('previewBtn').disabled = !hasItems;
  document.getElementById('clearBtn').disabled = !hasItems;
}

/* ============== MODAL: ADD NEW ============== */
function openAddItemModal() {
  document.getElementById('addItemModal').classList.add('active');
  document.getElementById('newItemCode').focus();
}
function closeAddItemModal() {
  document.getElementById('addItemModal').classList.remove('active');
  ['newItemCode','newItemName','newItemBrand','newItemSubCat'].forEach(id => {
    document.getElementById(id).value = '';
  });
}
function prefillAndAdd(query) {
  openAddItemModal();
  // Decide if query looks like a code (mostly digits/dashes) or a name
  if (/^[\d\-A-Z]+$/i.test(query) && query.length < 20) {
    document.getElementById('newItemCode').value = query;
    document.getElementById('newItemName').focus();
  } else {
    document.getElementById('newItemName').value = query;
    document.getElementById('newItemCode').focus();
  }
}
function saveNewItem() {
  const code = document.getElementById('newItemCode').value.trim();
  const name = document.getElementById('newItemName').value.trim();
  const brand = document.getElementById('newItemBrand').value.trim() || 'Custom';
  const subCat = document.getElementById('newItemSubCat').value.trim() || '';
  if (!code || !name) {
    toast('Item code and name are required', true);
    return;
  }
  if (allItems().find(i => i.c === code)) {
    toast('That item code already exists', true);
    return;
  }
  const newItem = { c: code, n: name, b: brand, s: subCat, co: 'CUSTOM', custom: true };
  customItems.push(newItem);
  persist();
  updateStats();
  renderBrandFilters();
  renderResults();
  addToCart(code);
  closeAddItemModal();
  toast(`Added new item: ${name}`);
}

/* ============== PRINT VIEW ============== */
function buildQrPayload(item) {
  // vCard 3.0 format — universally recognized by phone cameras (iPhone, Android,
  // Google Lens, all major scanner apps). On scan, the phone shows a clean
  // contact-style card with the inventory details. The user can dismiss the
  // card without saving — it's purely a display vehicle.
  // We pack the inventory data into visible vCard fields:
  //   FN  → shown as the big bold name        → Item Name
  //   ORG → shown as the "company"            → Brand
  //   TITLE → shown as the "job title"        → Item Code
  //   NOTE → shown as additional notes        → all three combined for copy/paste
  const name = (item.n || '').replace(/[\r\n;,]/g, ' ').trim();
  const code = (item.c || '').replace(/[\r\n;,]/g, ' ').trim();
  const brand = (item.b || '').replace(/[\r\n;,]/g, ' ').trim();
  return [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `N:${name};;;;`,
    `FN:${name}`,
    `ORG:${brand}`,
    `TITLE:Code ${code}`,
    `NOTE:${name} | Code: ${code} | Brand: ${brand}`,
    'END:VCARD'
  ].join('\r\n');
}

function generatePrintView(previewOnly) {
  try {
    const totalLabels = cart.reduce((s, c) => s + c.qty, 0);
    if (totalLabels === 0) {
      toast('Add at least one item to the queue first', true);
      return;
    }
    if (typeof qrcode === 'undefined') {
      alert('QR code library failed to load. Please refresh the page.');
      return;
    }
    if (typeof JsBarcode === 'undefined') {
      alert('Barcode library failed to load. Please refresh the page.');
      return;
    }

    // Expand cart into a flat array of (item × qty)
    const labels = [];
    cart.forEach(c => {
      const fullItem = findItem(c.c) || c;
      for (let i = 0; i < c.qty; i++) labels.push(fullItem);
    });

    // Build pages of LABELS_PER_PAGE per sheet
    const printArea = document.getElementById('printArea');
    printArea.innerHTML = '';
    const pages = Math.ceil(labels.length / LABELS_PER_PAGE);

    // Track which labels need QR/barcode rendering, with the actual data
    // (avoid putting data in HTML attributes — newlines get mangled by the parser)
    const qrJobs = [];
    const barcodeJobs = [];

    for (let p = 0; p < pages; p++) {
      const page = document.createElement('div');
      page.className = 'print-page';
      const grid = document.createElement('div');
      grid.className = 'label-grid';
      for (let i = 0; i < LABELS_PER_PAGE; i++) {
        const labelDiv = document.createElement('div');
        labelDiv.className = 'label';
        const idx = p * LABELS_PER_PAGE + i;
        if (idx < labels.length) {
          const item = labels[idx];

          const qrCell = document.createElement('div');
          qrCell.className = 'qr-cell';

          // Right column wraps info and barcode in a flex stack
          const infoStack = document.createElement('div');
          infoStack.className = 'info-stack';

          const info = document.createElement('div');
          info.className = 'info';
          const nameDiv = document.createElement('div');
          nameDiv.className = 'item-name-print';
          nameDiv.textContent = item.n;
          const brandDiv = document.createElement('div');
          brandDiv.className = 'brand-print';
          brandDiv.textContent = item.b;
          const codeDiv = document.createElement('div');
          codeDiv.className = 'code-print';
          codeDiv.textContent = item.c;
          info.appendChild(nameDiv);
          info.appendChild(brandDiv);
          info.appendChild(codeDiv);

          const barcodeCell = document.createElement('div');
          barcodeCell.className = 'barcode-cell';
          const barcodeSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          barcodeCell.appendChild(barcodeSvg);

          infoStack.appendChild(info);
          infoStack.appendChild(barcodeCell);

          labelDiv.appendChild(qrCell);
          labelDiv.appendChild(infoStack);

          // Queue the rendering jobs with direct element + data references
          qrJobs.push({ cell: qrCell, data: buildQrPayload(item) });
          barcodeJobs.push({ svg: barcodeSvg, code: item.c });
        }
        grid.appendChild(labelDiv);
      }
      page.appendChild(grid);
      printArea.appendChild(page);
    }

    // Render all QR codes
    let qrCount = 0;
    qrJobs.forEach(job => {
      try {
        // qrcode-generator: auto version (0), error correction M
        const qr = qrcode(0, 'M');
        qr.addData(job.data);
        qr.make();
        job.cell.innerHTML = qr.createSvgTag({ scalable: true, margin: 1 });
        const svg = job.cell.querySelector('svg');
        if (svg) {
          svg.setAttribute('width', '100%');
          svg.setAttribute('height', '100%');
          svg.style.width = '100%';
          svg.style.height = '100%';
        }
        qrCount++;
      } catch (e) {
        console.error('QR render error:', e, job.data);
      }
    });

    // Render all barcodes (Code128)
    let bcCount = 0;
    barcodeJobs.forEach(job => {
      try {
        JsBarcode(job.svg, job.code, {
          format: 'CODE128',
          width: 1.2,
          height: 24,
          displayValue: true,
          fontSize: 8,
          margin: 0,
          textMargin: 1
        });
        bcCount++;
      } catch (e) {
        console.error('Barcode error:', job.code, e);
      }
    });

    if (qrCount === 0 && bcCount === 0) {
      alert('Could not render labels. Open the browser console (F12) to see errors.');
      return;
    }

    document.body.classList.add('print-preview-mode');
    window.scrollTo(0, 0);

    if (!previewOnly) {
      // Give the browser one frame to paint, then open the print dialog
      setTimeout(() => {
        try { window.print(); }
        catch (e) { alert('Print dialog could not be opened: ' + e.message); }
      }, 400);
    }
  } catch (err) {
    console.error('generatePrintView fatal error:', err);
    alert('Something went wrong while generating labels:\n\n' + err.message + '\n\nOpen the browser console (F12) for details.');
  }
}

function closePrintView() {
  document.body.classList.remove('print-preview-mode');
  document.getElementById('printArea').innerHTML = '';
}

/* ============== UTILITIES ============== */
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeAttr(s) {
  return String(s == null ? '' : s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
let toastTimer;
function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'var(--danger)' : 'var(--accent)';
  t.style.color = isError ? 'white' : '#0a0e14';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ============== EVENTS ============== */
document.getElementById('searchBox').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderResults();
});
document.getElementById('addItemModal').addEventListener('click', (e) => {
  if (e.target.id === 'addItemModal') closeAddItemModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeAddItemModal();
    if (document.body.classList.contains('print-preview-mode')) closePrintView();
  }
});

// After printing, return to editor view
window.addEventListener('afterprint', () => {
  closePrintView();
});

/* ============== INIT ============== */
// Sanity-check libraries loaded
window.addEventListener('DOMContentLoaded', () => {
  const issues = [];
  if (typeof qrcode === 'undefined') issues.push('QR code library not loaded');
  if (typeof JsBarcode === 'undefined') issues.push('Barcode library not loaded');
  if (issues.length) {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:#f87171;color:white;padding:12px 20px;text-align:center;font-weight:600;position:sticky;top:0;z-index:99';
    banner.textContent = '⚠ ' + issues.join('; ') + '. Print/preview will not work — please contact support or re-download the file.';
    document.body.insertBefore(banner, document.body.firstChild);
  }
});

updateStats();
renderBrandFilters();
renderResults();
renderCart();
</script>
