
<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>ProSynergy Label Tool</title>

<script src='https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js'></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
margin:0;
}

h1{
text-align:center;
}

.top{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:left;
}

input{
width:100%;
padding:8px;
box-sizing:border-box;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px 20px;
background:black;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:15px;
margin-right:10px;
}

.sheet{
width:210mm;
min-height:297mm;
background:white;
margin:auto;
padding:8mm;
box-sizing:border-box;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6mm;
}

.label{
width:60mm;
height:35mm;
border:1px dashed #999;
border-radius:3mm;
position:relative;
padding:2mm;
overflow:hidden;
box-sizing:border-box;
}

.company{
font-size:7px;
text-align:center;
color:#666;
}

.item{
font-size:10px;
font-weight:bold;
text-align:center;
height:10mm;
overflow:hidden;
}

.barcodeArea{
width:36mm;
text-align:center;
}

.barcodeNo{
font-size:7px;
}

.qr{
position:absolute;
right:2mm;
bottom:2mm;
}

svg{
width:36mm;
height:10mm;
}

@media print{

.top{
display:none;
}

body{
background:white;
padding:0;
}

}

</style>

</head>

<body>

<div class='top'>

<h1>ProSynergy A4 Label Printing Tool</h1>

<table id='itemsTable'>
<thead>
<tr>
<th>#</th>
<th>Item Name</th>
<th>Item Code</th>
<th>Barcode Number</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

<button onclick='addRow()'>Add Row</button>
<button onclick='generateLabels()'>Generate Labels</button>
<button onclick='window.print()'>Print A4</button>

</div>

<div class='sheet'>
<div class='grid' id='labelsGrid'></div>
</div>

<script>

const tbody = document.querySelector("#itemsTable tbody");

/* DEFAULT 15 ROWS */

for(let i=1;i<=15;i++){

addRow();

}

function addRow(){

let row = document.createElement("tr");

row.innerHTML = `
<td></td>
<td><input type="text" class="item"></td>
<td><input type="text" class="code"></td>
<td><input type="text" class="barcode"></td>
`;

tbody.appendChild(row);

updateNumbers();

}

function updateNumbers(){

let rows = tbody.querySelectorAll("tr");

rows.forEach((r,index)=>{

r.cells[0].innerText = index + 1;

});

}

/* SAMPLE DATA */

tbody.rows[0].querySelector(".item").value = "Double A A4 Paper 80 GSM";
tbody.rows[0].querySelector(".code").value = "10025";
tbody.rows[0].querySelector(".barcode").value = "8851907100012";

tbody.rows[1].querySelector(".item").value = "Double A A3 Paper";
tbody.rows[1].querySelector(".code").value = "10026";
tbody.rows[1].querySelector(".barcode").value = "8851907100013";

/* GENERATE LABELS */

function generateLabels(){

const grid = document.getElementById("labelsGrid");
grid.innerHTML = "";

let rows = tbody.querySelectorAll("tr");

rows.forEach((row,index)=>{

let item = row.querySelector(".item").value.trim();
let code = row.querySelector(".code").value.trim();
let barcode = row.querySelector(".barcode").value.trim();

if(item && code && barcode){

let label = document.createElement("div");
label.className = "label";

label.innerHTML = `
<div class='company'>
ProSynergy Medical System Pvt Ltd
</div>

<div class='item'>
${item}
</div>

<div class='barcodeArea'>
<svg id='b${index}'></svg>
<div class='barcodeNo'>${barcode}</div>
</div>

<div class='qr'>
<canvas id='q${index}'></canvas>
</div>
`;

grid.appendChild(label);

/* BARCODE */

JsBarcode("#b"+index, barcode,{
format:"CODE128",
width:1,
height:20,
displayValue:false,
margin:0
});

/* CONTACT CARD QR */

let vCard =
"BEGIN:VCARD\r\n" +
"VERSION:3.0\r\n" +
"FN:" + item + "\r\n" +
"ORG:ProSynergy Medical System Pvt Ltd\r\n" +
"NOTE:Item Code : " + code + "\r\n" +
"END:VCARD";

QRCode.toCanvas(document.getElementById("q"+index), vCard,{
width:60,
margin:1,
errorCorrectionLevel:"L"
});

}

});

}

generateLabels();

</script>

</body>
</html>
