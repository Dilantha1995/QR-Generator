<style>

body {
    font-family: Arial;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}

.top {
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:black;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td {
    border:1px solid #ccc;
    padding:8px;
}

.sheet {
    width:210mm;
    min-height:297mm;
    background:white;
    margin:auto;
    padding:8mm;
    box-sizing:border-box;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6mm;
}

.label {
    width:60mm;
    height:35mm;
    border:1px dashed #999;
    border-radius:3mm;
    padding:2mm;
    position:relative;
    overflow:hidden;
    box-sizing:border-box;
}

.company {
    font-size:7px;
    text-align:center;
    color:#555;
}

.item {
    text-align:center;
    font-size:10px;
    font-weight:bold;
    height:10mm;
    overflow:hidden;
}

.barcodeArea {
    width:36mm;
    text-align:center;
}

.barcodeNo {
    font-size:7px;
}

.qr {
    position:absolute;
    right:2mm;
    bottom:2mm;
}

svg {
    width:36mm;
    height:10mm;
}

@media print {

.top {
    display:none;
}

body {
    background:white;
    padding:0;
}

}

</style>

</head>

const tbody = document.querySelector("#itemsTable tbody");

function addRow() {

    let row = document.createElement("tr");

    row.innerHTML = `
    <td></td>

    <td>
        <input list="itemsList" class="searchInput" placeholder="Search item">
    </td>

    <td>
        <input type="text" class="itemName">
    </td>

    <td>
        <input type="text" class="itemCode">
    </td>

    <td>
        <input type="text" class="barcode">
    </td>
    `;

    tbody.appendChild(row);

    updateNumbers();

    const search = row.querySelector(".searchInput");
    const itemName = row.querySelector(".itemName");
    const itemCode = row.querySelector(".itemCode");

    search.addEventListener("change", function() {

        let found = stockItems.find(i =>
            i.name.toLowerCase() === search.value.toLowerCase()
        );

        if(found) {
            itemName.value = found.name;
            itemCode.value = found.code;
        }

    });

}

function updateNumbers() {

    tbody.querySelectorAll("tr").forEach((r,i)=>{
        r.cells[0].innerText = i + 1;
    });

}

for(let i=0;i<15;i++) {
    addRow();
}

function generateLabels() {

    const grid = document.getElementById("labelsGrid");
    grid.innerHTML = "";

    tbody.querySelectorAll("tr").forEach((row,index)=>{

        let item = row.querySelector(".itemName").value.trim();
        let code = row.querySelector(".itemCode").value.trim();
        let barcode = row.querySelector(".barcode").value.trim();

        if(item && code && barcode) {

            let label = document.createElement("div");
            label.className = "label";

            label.innerHTML = `
            <div class="company">
            ProSynergy Medical System Pvt Ltd
            </div>

            <div class="item">
            ${item}
            </div>

            <div class="barcodeArea">
            <svg id="b${index}"></svg>
            <div class="barcodeNo">${barcode}</div>
            </div>

            <div class="qr">
            <canvas id="q${index}"></canvas>
            </div>
            `;

            grid.appendChild(label);

            JsBarcode("#b"+index, barcode,{
                format:"CODE128",
                width:1,
                height:20,
                displayValue:false,
                margin:0
            });

            /* CONTACT CARD QR */

            let vCard =
            "BEGIN:VCARD\r\n" +
            "VERSION:3.0\r\n" +
            "FN:" + item + "\r\n" +
            "ORG:ProSynergy Medical System Pvt Ltd\r\n" +
            "NOTE:Item Code : " + code + "\r\n" +
            "END:VCARD";

            QRCode.toCanvas(document.getElementById("q"+index), vCard,{
                width:60,
                margin:1,
                errorCorrectionLevel:"L"
            });

        }

    });

}
